<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/output.css">
</head>

<body>

    <div class="flex justify-center py-24 items-center bg-gray-200">
        <div class="bg-[#f3f3f3] px-2 pt-5 pb-2 rounded-lg border">
            <div class="px-1.5">
                <div class="flex justify-between">
                    <div class="flex gap-3">
                        <span id="menuBtn" class="text-base pt-1.5 py-1 px-2 rounded-sm hover:bg-[#EAEAEA]">
                            <i class="fa-solid fa-bars"></i>
                        </span>

                        <span class="text-xl font-semibold pt-0.5">Standard</span>
                        <span class="text-base pt-1 py-1 px-2 rounded-sm hover:bg-[#EAEAEA]"><i
                                class="fa-solid fa-up-right-from-square"></i></span>
                    </div>
                    <div class="pt-1 relative">
                        <span class="text-base py-1 px-2 rounded-sm hover:bg-[#EAEAEA]"><i
                                class="fa-solid fa-clock-rotate-left"></i></span>
                    </div>
                </div>

                <div id="formulaDisplay" class="text-right text-gray-500 text-xl font-light h-6 overflow-hidden mt-2">
                </div>

                <div class="text-right pt-2 pb-6 text-4xl font-semibold" id="currentDisplay">
                    0
                </div>

                <div class="flex justify-between pb-2 text-sm font-light">
                    <div class="text-[#9F999F] pt-1">MC</div>
                    <div class="text-[#9F999F] pt-1">MR</div>
                    <div class="py-1 px-2 rounded-sm hover:bg-[#EAEAEA]">M+</div>
                    <div class="py-1 px-2 rounded-sm hover:bg-[#EAEAEA]">M-</div>
                    <div class="py-1 px-2 rounded-sm hover:bg-[#EAEAEA]">MS</div>
                    <div class="text-[#9F999F] pt-1">M<i class="fa-solid fa-chevron-down"></i></div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-0.5">

                <button onclick="percentage()" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">%</button>
                <button onclick="clearCalc()" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">CE</button>
                <button onclick="clearCalc()" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">C</button>
                <button onclick="backspace()" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">
                    <i class="fa-solid fa-delete-left"></i>
                </button>

                <button onclick="shownum('1/x')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">1/x</button>
                <button onclick="shownum('x²')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">x²</button>
                <button onclick="shownum('√')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">√</button>
                <button onclick="enterOperator('/')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">/</button>

                <button onclick="shownum('7')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">7</button>
                <button onclick="shownum('8')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">8</button>
                <button onclick="shownum('9')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">9</button>
                <button onclick="enterOperator('*')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">*</button>

                <button onclick="shownum('4')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">4</button>
                <button onclick="shownum('5')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">5</button>
                <button onclick="shownum('6')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">6</button>
                <button onclick="enterOperator('-')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">-</button>

                <button onclick="shownum('1')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">1</button>
                <button onclick="shownum('2')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">2</button>
                <button onclick="shownum('3')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">3</button>
                <button onclick="enterOperator('+')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">+</button>

                <button onclick="toggleSign()" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">±</button>
                <button onclick="shownum('0')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">0</button>
                <button onclick="shownum('.')" class="flex items-center justify-center w-18 h-13 border border-[#E5E5E5] bg-white hover:bg-[#F6F6F6] rounded-sm">.</button>
                <button onclick="enterOperator('=')" class="flex items-center justify-center w-18 h-13 text-white bg-[#413F3D] hover:bg-[#53514F] rounded-sm">=</button>

            </div>
        </div>
    </div>

    <script>
        let operand1 = "";
        let operand2 = "";
        let operator = "";

        function shownum(num) {
            if (num === "") {

            } else {
                if (operator === "") {
                    operand1 += num;
                } else {
                    operand2 += num;
                }
            }
            printHtml(operator === "" ? operand1 : operand2);
        }

        function enterOperator(op) {
            if (op === "=") {
                if (!operand1 || !operator || !operand2) return;
                
                let result = 0;
                if (operator === "+") 
                result = Number(operand1) + Number(operand2);
                else if (operator === "-") 
                result = Number(operand1) - Number(operand2);
                else if (operator === "*") 
                result = Number(operand1) * Number(operand2);
                else if (operator === "/") 
                result = Number(operand1) / Number(operand2);

                printHtml(result);
                operand1 = "";
                operand2 = "";
                operator = "";
                
                return;
            }

            if (operand1 && operator && operand2) {
                let result = 0;
                if (operator === "+")
                result = Number(operand1) + Number(operand2);
                else if (operator === "-")
                result = Number(operand1) - Number(operand2);
                else if (operator === "*")
                result = Number(operand1) * Number(operand2);
                else if (operator === "/")
                result = Number(operand1) / Number(operand2);

                operand1 = String(result);
                operand2 = "";
                operator = "";
                printHtml(result);
            }

            operator = op;
        }

        function clearCalc() {
            operand1 = "";
            operand2 = "";
            operator = "";
            printHtml("0");
        }
        
        function backspace() {
            if (operator === "") {
                operand1 = operand1.slice(0, -1);
                printHtml(operand1 || "0");
            } 
            else if (operand2 == "") {
                operator = operator.slice(0, -1);
                printHtml(operator || "");
            }
             else {
                operand2 = operand2.slice(0, -1);
                printHtml(operand2 || "0");
            }
        }
        //agar first value ho to wo devided by 100 ho jae lekin do num or op ho to operand1 * operand2 / 100 ho jae. 
        function percentage() {
            if (operator === "") {
                if (operand1) {
                    operand1 = Number(operand1) / 100;
                    printHtml(operand1);
                }
            }
             else if (operand2) {
                let result = Number(operand1) * Number(operand2) / 100;
                operand2 =(result);
                printHtml(operand2);
            }
        }
        

        function printHtml(txt) {
            document.getElementById('currentDisplay').innerHTML = txt || "0";
        }
    </script>
</body>

</html>
